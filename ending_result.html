<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCC Terminal - Final Report</title>
    <link rel="stylesheet" href="style_detective.css">
    <style>
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .ending-container {
            width: 90%;
            max-width: 800px;
            padding: 40px;
            border: 1px solid #00ff41;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.2);
            position: relative;
        }

        #ending-text {
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap; /* 改行を維持 */
            min-height: 200px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .footer-nav {
            margin-top: 40px;
            text-align: center;
            opacity: 0;
            transition: opacity 2s;
        }

        .btn-retry {
            background: none;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px 30px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-retry:hover {
            background: #00ff41;
            color: #000;
        }

        /* 画面のノイズ演出 */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 255, 65, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="ending-container">
        <h3 style="text-align: center; letter-spacing: 10px; border-bottom: 1px solid #00ff41; padding-bottom: 10px;">
            FINAL LOG: RECOVERY COMPLETE
        </h3>
        
        <div id="ending-text"></div><span id="cursor" class="cursor"></span>

        <div id="footer" class="footer-nav">
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">>> すべての記録はスプレッドシートに保存されました。</p>
            <a href="index.html" class="btn-retry">RESTART SYSTEM</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // accusation.js から保存されたテキストを取得
            const text = sessionStorage.getItem('finalEndingText') || "記録が正常に読み込めませんでした。宇宙の深淵にデータが消失したようです。";
            const displayElement = document.getElementById('ending-text');
            const footer = document.getElementById('footer');
            const cursor = document.getElementById('cursor');

            let i = 0;
            const speed = 70; // 1文字出すスピード（ミリ秒）

            function typeWriter() {
                if (i < text.length) {
                    displayElement.innerHTML += text.charAt(i);
                    i++;
                    // 文字数に応じてスクロール位置を調整
                    window.scrollTo(0, document.body.scrollHeight);
                    setTimeout(typeWriter, speed);
                } else {
                    // 終了後の演出
                    cursor.style.display = 'none';
                    footer.style.opacity = '1';
                }
            }

            // 少し待ってから開始（没入感のため）
            setTimeout(typeWriter, 1000);
        });
    </script>
</body>
</html>
