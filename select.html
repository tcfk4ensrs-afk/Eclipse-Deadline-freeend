<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCC Terminal - Sector Investigation</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050a05;
            --dim-green: rgba(0, 255, 65, 0.15);
            --warning-yellow: #ffff00;
            --error-red: #ff0000;
        }

        body {
            background: var(--dark-bg);
            background-image: 
                linear-gradient(var(--dim-green) 1px, transparent 1px),
                linear-gradient(90deg, var(--dim-green) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 走査線演出 */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* --- レスポンシブ・グリッド --- */
        .game-container {
            display: grid;
            grid-template-columns: 320px 1fr 300px; /* PCレイアウト */
            gap: 15px;
            width: 98vw;
            height: 95vh;
            padding: 10px;
            box-sizing: border-box;
        }

        /* タブレット・スマホ対応 */
        @media (max-width: 1100px) {
            .game-container {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: auto;
            }
            body { overflow-y: auto; align-items: flex-start; }
            .panel { height: auto; min-height: 300px; margin-bottom: 10px; }
            .panel:nth-child(2) { height: 500px; } /* スキャナーはある程度高さを確保 */
        }

        .panel {
            border: 1px solid var(--neon-green);
            background: rgba(0, 5, 0, 0.9);
            backdrop-filter: blur(8px);
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px var(--dim-green);
            position: relative;
            overflow: hidden;
        }

        h3 { border-bottom: 1px solid var(--neon-green); padding-bottom: 8px; margin-top: 0; font-size: 1em; letter-spacing: 2px; z-index: 2; }

        /* キャラクターボタン */
        .char-btn {
            width: 100%; height: 70px; margin: 8px 0;
            background: transparent; color: var(--neon-green);
            border: 1px solid var(--neon-green); cursor: pointer;
            display: flex; align-items: center; overflow: hidden; z-index: 2;
        }

        .char-img-thumb { width: 70px; height: 70px; border-right: 1px solid var(--neon-green); background: #000; flex-shrink: 0; }
        .char-img-thumb img { width: 100%; height: 100%; object-fit: cover; filter: sepia(1) hue-rotate(90deg) contrast(1.2); }
        .char-info { flex: 1; padding: 0 10px; text-align: left; }
        .char-name-label { font-size: 0.9em; font-weight: bold; }
        .status-label { font-size: 0.6em; padding: 2px 4px; border: 1px solid; border-radius: 2px; }

        .char-btn.active { background: var(--neon-green) !important; color: #000 !important; }
        .char-btn.active .char-img-thumb img { filter: none; }

        /* --- 地図モーダル対応 --- */
        #map-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #map-overlay img {
            max-width: 95%; max-height: 95%;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 30px var(--dim-green);
        }

        .char-map-container {
            margin-top: 5px; border: 1px solid var(--neon-green);
            background: #000; padding: 5px; z-index: 2;
        }
        .char-map-container img {
            width: 100%; cursor: zoom-in;
            filter: sepia(1) hue-rotate(90deg) brightness(0.7);
            transition: 0.3s;
        }
        .map-label { font-size: 0.6em; text-align: center; display: block; margin-bottom: 2px; }

        /* スキャナー */
        .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; z-index: 2; }
        .loc-btn {
            padding: 15px 5px; background: rgba(0, 255, 65, 0.05);
            color: var(--neon-green); border: 1px solid var(--neon-green);
            cursor: pointer; font-size: 0.9em;
        }
        .loc-btn:hover:not(:disabled) { background: var(--neon-green); color: #000; }

        #log-window {
            flex-grow: 1; border: 1px inset var(--neon-green);
            background: #000; margin-top: 10px; padding: 10px;
            overflow-y: auto; font-size: 0.85em; line-height: 1.5; z-index: 2;
        }

        .turn-display {
            font-size: 1.1em; color: var(--warning-yellow);
            text-align: center; padding: 8px; border: 2px double var(--warning-yellow);
            margin-bottom: 15px; background: rgba(255, 255, 0, 0.05); z-index: 2;
        }

        .evidence-item {
            margin-bottom: 10px; border-left: 3px solid var(--warning-yellow);
            padding: 5px 10px; background: rgba(255, 255, 0, 0.05); font-size: 0.85em;
        }
    </style>
</head>
<body>

    <div id="map-overlay" onclick="closeMap()">
        <img id="enlarged-map" src="" alt="Enlarged Map">
    </div>

    <div class="game-container">
        <div class="panel">
            <h3>OPERATIVE STATUS</h3>
            <div id="char-list">
                <button class="char-btn" id="btn-engineer" onclick="selectChar('engineer')">
                    <div class="char-img-thumb"><img src="assets/noa.jpg" alt="Noa"></div>
                    <div class="char-info">
                        <div class="char-name-label">ノア (ENG)</div>
                        <span class="status-label status-available" id="status-engineer">AVAILABLE</span>
                    </div>
                </button>
                <button class="char-btn" id="btn-captain" onclick="selectChar('captain')">
                    <div class="char-img-thumb"><img src="assets/haris.jpg" alt="Harris"></div>
                    <div class="char-info">
                        <div class="char-name-label">ハリス (CPT)</div>
                        <span class="status-label status-available" id="status-captain">AVAILABLE</span>
                    </div>
                </button>
                <button class="char-btn" id="btn-pilot" onclick="selectChar('pilot')">
                    <div class="char-img-thumb"><img src="assets/riku.jpg" alt="Riku"></div>
                    <div class="char-info">
                        <div class="char-name-label">リク (PLT)</div>
                        <span class="status-label status-available" id="status-pilot">AVAILABLE</span>
                    </div>
                </button>
                <button class="char-btn" id="btn-observer" onclick="selectChar('observer')">
                    <div class="char-img-thumb"><img src="assets/mei.jpg" alt="Mei"></div>
                    <div class="char-info">
                        <div class="char-name-label">メイ (OBS)</div>
                        <span class="status-label status-available" id="status-observer">AVAILABLE</span>
                    </div>
                </button>

                <div class="char-map-container">
                    <span class="map-label">INTERNAL SCHEMATIC (MAP-02)</span>
                    <img src="assets/map2.jpg" alt="Ship Map 2" onclick="openMap(this.src)">
                </div>
            </div>
            <div style="margin-top: auto; font-size: 0.6em; color: #888; border-top: 1px solid #333; padding-top: 10px;">
                ※通信安定のため同一要員の連続派遣は禁止
            </div>
        </div>

        <div class="panel">
            <div class="turn-display">MISSION: T-<span id="turn-count">1</span> / 5</div>
            <h3>SECTOR SCANNER</h3>
            <div class="location-grid">
                <button class="loc-btn" onclick="executeInvestigate('脱出ポッド')">脱出ポッド</button>
                <button class="loc-btn" onclick="executeInvestigate('操縦室')">操縦室</button>
                <button class="loc-btn" onclick="executeInvestigate('倉庫')">倉庫</button>
                <button class="loc-btn" onclick="executeInvestigate('寝室')">寝室</button>
                <button class="loc-btn" onclick="executeInvestigate('エンジンルーム')">エンジンルーム</button>
            </div>
            <div id="log-window">>> 待機中。要員を選択してください。</div>
        </div>

        <div class="panel">
            <h3>RECOVERED DATA</h3>
            <div id="evidence-list">
                <p style="color:#444; font-size:0.75em; text-align: center; margin-top: 20px;">NO DATA SECURED</p>
            </div>
        </div>
    </div>

    <script>
        // 画像拡大ロジック
        function openMap(src) {
            const overlay = document.getElementById('map-overlay');
            const img = document.getElementById('enlarged-map');
            img.src = src;
            overlay.style.display = 'flex';
        }
        function closeMap() {
            document.getElementById('map-overlay').style.display = 'none';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
