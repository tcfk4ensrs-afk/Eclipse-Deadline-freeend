<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINAL PROTOCOL - ECLIPSE DEADLINE</title>
    <style>
        :root {
            --error-red: #ff3333;
            --bg-black: #0a0000;
        }
        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto; /* 記述式は入力欄が多いためスクロールを許可 */
        }
        .container {
            width: 90%;
            max-width: 650px;
            border: 2px solid var(--error-red);
            padding: 30px;
            background: rgba(20, 0, 0, 0.9);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
            position: relative;
            margin: 20px 0;
        }
        h2 {
            color: var(--error-red);
            text-align: center;
            letter-spacing: 5px;
            border-bottom: 1px solid var(--error-red);
            padding-bottom: 10px;
        }
        .instruction {
            font-size: 0.85rem;
            margin: 20px 0;
            line-height: 1.6;
            color: #ccc;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--error-red);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        /* 入力欄のスタイル */
        input[type="text"], textarea {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid var(--error-red);
            padding: 12px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }
        textarea {
            resize: vertical;
            line-height: 1.5;
        }
        input[type="text"]:focus, textarea:focus {
            box-shadow: 0 0 10px var(--error-red);
        }
        .btn-execute {
            width: 100%;
            background: var(--error-red);
            color: #000;
            border: none;
            padding: 18px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-execute:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
        .scanline {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,51,51,0.02) 50%);
            background-size: 100% 4px;
            position: fixed; top:0; left:0; pointer-events:none;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <h2>FINAL PROTOCOL</h2>
        <div class="instruction">
            [警告] これよりバイオリサイクル再起動シーケンスを開始します。隔離・投入する対象、およびその執行理由を入力してください。あなたの「言葉」がこの船の最終結論としてアーカイブされます。
        </div>

        <div class="input-form">
            <div class="input-group">
                <label>EXECUTION_TARGET (誰を、または何を隔離・投入しますか？)</label>
                <input type="text" id="player-target" placeholder="例：ノアと医師の遺体 / ハリス船長 / 柱">
            </div>

            <div class="input-group">
                <label>DESTINATION (どこへ送りますか？)</label>
                <input type="text" id="player-location" placeholder="例：バイオ・リアクター / 脱出ポッド">
            </div>

            <div class="input-group">
                <label>FINAL_STATEMENT (執行の根拠、または最期の言葉)</label>
                <textarea id="player-reason" rows="5" placeholder="例：ノア、お前の計算はここで終わりだ。この船を救うための質量になってもらう。"></textarea>
            </div>
        </div>

        <button onclick="executeFinalCommand()" id="execute-btn" class="btn-execute">
            CONFIRM & EXECUTE
        </button>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="detective.html" style="color: #666; font-size: 0.7rem; text-decoration: none;">>> 尋問に戻る (再考)</a>
        </div>
    </div>

    <script src="accusation.js"></script>
</body>
</html>
