<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FINAL PROTOCOL - ECLIPSE DEADLINE</title>
    <style>
        :root {
            --error-red: #ff3333;
            --bg-black: #0a0000;
        }
        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 600px;
            border: 2px solid var(--error-red);
            padding: 40px;
            background: rgba(20, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
            position: relative;
        }
        h2 {
            color: var(--error-red);
            text-align: center;
            letter-spacing: 5px;
            border-bottom: 1px solid var(--error-red);
            padding-bottom: 10px;
        }
        .instruction {
            font-size: 0.9rem;
            margin: 20px 0;
            line-height: 1.6;
        }
        .selection-grid {
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }
        .select-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.8rem;
            color: var(--error-red);
            margin-bottom: 5px;
        }
        select {
            background: #000;
            color: #fff;
            border: 1px solid var(--error-red);
            padding: 10px;
            font-size: 1.1rem;
            outline: none;
        }
        .btn-execute {
            width: 100%;
            background: var(--error-red);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-execute:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
        /* スキャンライン演出 */
        .scanline {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,51,51,0.05) 50%);
            background-size: 100% 4px;
            position: absolute; top:0; left:0; pointer-events:none;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <h2>FINAL PROTOCOL</h2>
        <div class="instruction">
            [警告] これよりバイオ・コンバーター再起動のための「質量提供」および「容疑者隔離」シーケンスを開始します。選択された対象は指定セクターへ強制移送されます。
        </div>

        <div class="selection-grid">
            <div class="select-group">
                <label>対象 A (質量ユニット1)</label>
                <select id="select-target-1">
                    <option value="ハリス">ハリス船長</option>
                    <option value="リク">操縦士リク</option>
                    <option value="ノア">技師ノア</option>
                    <option value="メイ">観測員メイ</option>
                    <option value="医者">医師の遺体</option>
                    <option value="柱">内装の木柱</option>
                </select>
            </div>

            <div class="select-group">
                <label>対象 B (質量ユニット2)</label>
                <select id="select-target-2">
                    <option value="ハリス">ハリス船長</option>
                    <option value="リク">操縦士リク</option>
                    <option value="ノア">技師ノア</option>
                    <option value="メイ">観測員メイ</option>
                    <option value="医者">医師の遺体</option>
                    <option value="柱">内装の木柱</option>
                </select>
            </div>

            <div class="select-group">
                <label>移送先セクター</label>
                <select id="select-room">
                    <option value="エンジン">バイオ・リアクター (エンジン部)</option>
                    <option value="トイレ">後部トイレ</option>
                    <option value="管制室">メインブリッジ</option>
                    <option value="脱出ポッド">損傷した脱出ポッド</option>
                </select>
            </div>
        </div>

        <button onclick="executeFinalCommand()" class="btn-execute">
            EXECUTE COMMAND
        </button>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="detective.html" style="color: #555; font-size: 0.7rem; text-decoration: none;">>> 尋問に戻る (再考)</a>
        </div>
    </div>

    <script src="accusation.js"></script>
</body>
</html>
