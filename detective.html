<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCC Terminal - Interrogation Phase</title>
    <link rel="stylesheet" href="style_detective.css">
    <style>
        /* --- 画面全体の基本設定 --- */
        body { 
    margin: 0; 
    padding: 0; 
    /* PCでは固定、スマホではスクロールを許可 */
    overflow-x: hidden;
    overflow-y: auto !important; 
    height: auto !important;
    min-height: 100vh;
}

.game-container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 15px;
    width: 100vw;
    /* 🟢 height: 100vh をやめて min-height に変更 */
    min-height: 100vh;
    height: auto; 
    padding: 10px;
    box-sizing: border-box;
}

@media (max-width: 850px) {
    .game-container {
        display: flex;
        flex-direction: column;
        height: auto !important;
        min-height: 100vh;
        overflow: visible !important;
    }
    .side-panel { 
        width: 100% !important; 
        height: auto !important;
        margin-bottom: 20px;
    }
    .main-panel { 
        width: 100% !important;
        /* チャットエリアの高さを確保しつつ、外側はスクロールさせる */
        height: 70vh !important; 
        min-height: 400px;
    }
}
        }

        /* --- メインパネルの内部レイアウト --- */
        .main-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #main-menu {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .char-grid {
            flex-grow: 1;
            overflow-y: auto;
        }

        /* --- 地図モーダル演出 --- */
        #map-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #map-overlay img {
            max-width: 95%;
            max-height: 95%;
            border: 2px solid #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
        }

        /* --- 地図パネルの装飾 --- */
        .map-panel {
            margin-top: 15px;
            border: 1px solid #00ff41;
            padding: 8px;
            background: rgba(0, 10, 0, 0.8);
            flex-shrink: 0;
        }

        .map-container img {
            width: 100%;
            cursor: zoom-in;
            filter: sepia(1) hue-rotate(90deg) brightness(0.8);
            transition: 0.3s;
        }

        /* --- 尋問ルームのレイアウト --- */
        #interrogation-room {
            display: none; 
            height: 100%;
            flex-direction: column;
            overflow: hidden; 
        }

        .chat-header {
            flex-shrink: 0; 
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
        }

        #chat-log {
            flex-grow: 1; 
            overflow-y: auto; 
            border: 1px solid #222;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.5);
            scrollbar-width: thin;
            scrollbar-color: #00ff41 transparent;
        }

        .input-area {
            flex-shrink: 0; 
            display: flex;
            gap: 5px;
            background: #000;
            padding-top: 5px;
        }

        .danger-btn {
            background: #4a0000; color: #ff3333; border: 1px solid #ff3333;
            padding: 12px; width: 100%; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map-overlay" onclick="closeMap()">
        <img id="enlarged-map" src="" alt="Enlarged Map">
    </div>

    <div class="game-container">
        <div class="panel side-panel">
            <h3>SECURED EVIDENCE</h3>
            <div id="evidence-list" style="flex-grow: 1; overflow-y: auto;"></div>

            <div class="map-panel">
                <h4 style="font-size: 0.6rem; color: #00ff41; text-align: center; margin: 0 0 5px 0;">SCHEMATIC: MAP-01</h4>
                <div class="map-container">
                    <img src="assets/map1.jpg" alt="Ship Map 1" onclick="openMap(this.src)">
                </div>
            </div>
            
            <div class="status-box" style="margin-top: 15px; flex-shrink: 0;">
                <button id="accuse-btn" class="danger-btn" onclick="goToAccusation()">👉 真犯人を告発する</button>
            </div>
        </div>

        <div class="panel main-panel">
            <div id="main-menu">
                <div class="header">
                    <h2>INTERROGATION PROTOCOL</h2>
                    <p style="font-size: 0.8rem;">[STATUS: CLOUD CONNECTION ACTIVE]</p>
                </div>
                <div id="character-list" class="char-grid"></div>
            </div>

            <div id="interrogation-room">
                <div class="chat-header">
                    <button id="back-btn" style="background: none; color: #00ff41; border: 1px solid #00ff41; cursor: pointer;">⬅ 戻る</button>
                    <span id="target-name">TARGET</span>
                </div>
                
                <div id="chat-log"></div>
                
                <div class="input-area">
                    <input type="text" id="chat-input" placeholder="問い詰める内容を入力..." style="flex-grow: 1; background: #000; color: #fff; border: 1px solid #00ff41; padding: 10px;">
                    <button id="send-btn" style="background: #00ff41; color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer;">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openMap(src) {
            const overlay = document.getElementById('map-overlay');
            const img = document.getElementById('enlarged-map');
            img.src = src;
            overlay.style.display = 'flex';
        }

        function closeMap() {
            document.getElementById('map-overlay').style.display = 'none';
        }

        function goToAccusation() {
            if (confirm("尋問を終了し、告発プロトコルへ移行しますか？\n（この操作は取り消せません）")) {
                document.body.style.opacity = "0";
                document.body.style.transition = "opacity 1s";
                setTimeout(() => { window.location.href = "accusation.html"; }, 1000);
            }
        }
    </script>

    <script type="module">
        import { sendToAI } from './ai.js';
        window.sendToAI = sendToAI;
    </script>

    <script src="script_detective.js"></script>
</body>
</html>
